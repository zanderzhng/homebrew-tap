name: Update CodexTools

on:
  schedule:
    - cron: "47 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-codextools
  cancel-in-progress: false

jobs:
  update:
    runs-on: macos-15
    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}

    steps:
      - name: Check out tap
        uses: actions/checkout@v5

      - name: Update cask metadata
        run: ruby script/update-codextools

      - name: Run updater tests
        run: ruby test/cask_updater_test.rb

      - name: Register checkout as a tap
        run: brew tap zanderzhng/tap "file://$GITHUB_WORKSPACE" --custom-remote

      - name: Copy updated cask into local tap
        run: cp Casks/codextools.rb "$(brew --repository zanderzhng/tap)/Casks/codextools.rb"

      - name: Check cask style
        run: brew style --cask zanderzhng/tap/codextools

      - name: Audit cask
        run: brew audit --cask --online zanderzhng/tap/codextools

      - name: Commit update
        run: |
          if git diff --quiet -- Casks/codextools.rb; then
            echo "Cask is already current."
            exit 0
          fi

          version="$(ruby -ne 'puts $1 if $_ =~ /^\s*version "([^"]+)"$/' Casks/codextools.rb)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- Casks/codextools.rb
          git commit -m "chore: update codextools to ${version}"
          git push
