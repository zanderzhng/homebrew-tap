name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}

    steps:
      - name: Check out tap
        uses: actions/checkout@v5

      - name: Run updater tests
        run: ruby test/cask_updater_test.rb

      - name: Register checkout as a tap
        run: brew tap zanderzhng/tap "file://$GITHUB_WORKSPACE" --custom-remote

      - name: Check cask style
        run: brew style --cask zanderzhng/tap/codexplusplus zanderzhng/tap/codextools

      - name: Audit cask
        run: brew audit --cask --online zanderzhng/tap/codexplusplus zanderzhng/tap/codextools
